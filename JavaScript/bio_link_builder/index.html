<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playlist Link Manager</title>
    <link rel="stylesheet" href="bio_link.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Playlist Link Manager</h1>

        <button id="themeBtn">Toggle Theme</button>
      </div>

      <div class="form">
        <input type="text" id="playlistName" placeholder="Playlist Name" />

        <input
          type="text"
          id="playlistUrl"
          placeholder="https://spotify.com/..."
        />

        <p id="error"></p>

        <button id="saveBtn">Save Playlist</button>
      </div>

      <div id="playlistContainer"></div>
    </div>

    <script src="bio_link.js"></script>
  </body>
</html>

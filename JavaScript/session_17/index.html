<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Delegation Tasks</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Task 1,2,3 -->
    <h2>Favorite Songs</h2>

    <ul id="song-list">
      <li>
        Believer
        <button class="remove-song">Remove</button>
      </li>

      <li>
        Heat Waves
        <button class="remove-song">Remove</button>
      </li>

      <li>
        Perfect
        <button class="remove-song">Remove</button>
      </li>
    </ul>

    <hr />

    <!-- Task 4,5,6,9 -->
    <h2>Flipkart Wishlist</h2>

    <button id="add-product">Add Product</button>

    <div id="wishlist">
      <div class="card">
        Laptop
        <button class="remove-btn">X</button>
      </div>

      <div class="card">
        Mouse
        <button class="remove-btn">X</button>
      </div>
    </div>

    <hr />

    <!-- Task 10,11 -->
    <h2>Notifications</h2>

    <button id="add-notification">Add Notification</button>

    <div id="notifications">
      <div class="notification">
        New Video Uploaded
        <button class="dismiss-btn">Dismiss</button>
      </div>

      <div class="notification">
        New Comment Received
        <button class="dismiss-btn">Dismiss</button>
      </div>
    </div>

    <script src="event_deleg.js"></script>
  </body>
</html>

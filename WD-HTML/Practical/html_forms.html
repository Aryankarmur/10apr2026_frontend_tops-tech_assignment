<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact form</title>
</head>
<body>
    <form>
        <h2>Contact form</h2>
        
        <label for="fname">Enter full name : </label>
        <input type="text" name="fname" id="fname" minlength="15" maxlength="20" required>
        <br><br>

        <label for="email">Enter your Email : </label>
        <input type="email" name="email" id="email" required>
        <br><br>

        <label for="phone">Enter phone number : </label>
        <input type="tel" name="phone" id="phone" required pattern="123-123-1234">
        <br><br>

        <label for="sub">Enter Subject : </label>
        <select name="sub" id="sub" required>
            <option value="reason 1">Reason 1</option>
            <option value="reason 2">Reason 2</option>
            <option value="reason 3">Reason 3</option>
        </select>
        <br><br>

        <label for="msg"> Enter Message : </label>
        <textarea name="msg" id="msg" required></textarea>
        <br><br>

        <input type="submit" value="Submit">

    </form>
</body>
</html>

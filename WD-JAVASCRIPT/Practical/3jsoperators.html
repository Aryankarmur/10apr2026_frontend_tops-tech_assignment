<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript Operators</title>
  </head>
  <body>
    <script>
      var a = 18;
      var b = 24;

      //  Add, subtract, multiply, and divide
      document.write("<h3>Add, subtract, multiply, and divide</h3>");
      document.write(" addition of a and b is : " + (a + b));
      document.write("<br> subtract of a and b is : " + (a - b));
      document.write("<br> multiplication of a and b is : " + a * b);
      document.write("<br> division of a and b is : " + a / b);
      
      //   checking numbers are equal or greater than other
      document.write("<h3>checking numbers are equal or greater than other</h3>");
      if(a==b){
          document.write("numbers are equal!");
        }else if(a>b){
            document.write("a is greater than b!");
        }else{
            document.write("b is greater than a!");
        }
        
        //   checking both conditions (e.g., a > 10 and b < 5)
        document.write("<h3>checking both conditions (e.g., a > 10 and b < 5)</h3>");
        if(a>10 && b<5){
            document.write("condition is true!");
        }else{
            document.write("condition is false !");

        }

    </script>
  </body>
</html>

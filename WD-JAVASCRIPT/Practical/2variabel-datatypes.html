<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Variables and Data Types</title>
  </head>
  <body>
    <script>
        var a = 1;
        var b = "abcd";
        var c = true;
        var d = null;
        var e;

        console.log("type of a is: "+ typeof(a)+ " and value of a is : "+ a);
        console.log("type of b is: "+ typeof(b)+ " and value of b is : "+ b);
        console.log("type of c is: "+ typeof(c)+ " and value of c is : "+ c);
        console.log("type of d is: "+ typeof(d)+ " and value of d is : "+ d);
        console.log("type of e is: "+ typeof(e)+ " and value of e is : "+ e);
        
    </script>
  </body>
</html>

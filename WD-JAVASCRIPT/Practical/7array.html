<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array</title>
</head>
<body>
    <script>
        // task 1
        let fruits = ["apple", "banana", "cherry"];

        // add fruit to last
        fruits.push("grapes");

        // remove fruit from start
        fruits.shift();

        console.log(fruits);


        //  task 2
        let num = [1,3,4,5,6,7];
        let sum=0;
        for(let i = 0; i<num.length; i++){
            sum = sum + parseInt(num[i]);   
        }
        console.log(sum);
        

    </script>
</body>
</html>

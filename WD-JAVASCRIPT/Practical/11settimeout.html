<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>settimeout</title>
</head>
<body>
    <script>
        let body = document.querySelector("body");

        setTimeout(()=>{
            body.style.backgroundColor="red";
        },5000)

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>if else and switch statement</title>
</head>
<body>
    <script>
        // number is positive, negative, or zero using an if-else statement
        document.write("<h3>checking number is positive, negative, or zero using an if-else statement</h3>");
        var num = 6;
        
        if(num>0){
            document.write("number is positive !");
        }else if(num<0){
            document.write("number is negative !");
        }else if(num === 0){
            document.write("number is zero !");
        }else{
            document.write("value is not a number !");
            
        }


        // display the day of the week using switch case
        document.write("<h3>display the day of the week using switch case</h3>");
        var day = 4;

        switch(day){
            case 1:{
                document.write("day is sunday !");
                break;
            }
            case 2:{
                document.write("day is monday !");
                break;
            }
            case 3:{
                document.write("day is tuesday !");
                break;
            }
            case 4:{
                document.write("day is wednesday !");
                break;
            }
            case 5:{
                document.write("day is thursday !");
                break;
            }
            case 6:{
                document.write("day is friday !");
                break;
            }
            case 7:{
                document.write("day is saturday !");
                break;
            }
        }

    </script>
</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>loops</title>
  </head>
  <body>
    <script>
      // for loop
      document.write(" using for loop ");
      for (let i = 1; i <= 10; i++) {
        document.write("<br>" + i);
      }

      // while loop
      document.write("<br><br> using while loop <br>");
      var even_num_sum = 0;
      let i = 1;
      while (i <= 20) {
        if (i % 2 === 0) {
          even_num_sum = even_num_sum + i;
        }

        i++;
      }

      document.write("<br> sum of even numbers is : " + even_num_sum);

      // do while loop
      let num;

      do {
        num = Number(prompt("Enter a number greater than 10:"));
      } while (num <= 10);
      
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact form</title>
    <link rel="stylesheet" href="1CSS_selectors_&_styling.css">
</head>
<body>
    <form>
        <h2>Contact form</h2>
        <div id="detailesfield">
           
                <label for="name">Enter name: <input type="text" name="name" id="name" required></label>

                <label for="email">Enter Email: <input type="email" name="email" id="email" required></label>

                <label for=mob_no>Enter mobile no: <input type="tel" name=mob_no id=mob_no required></label>

                <label for="address"> Enter address : 
                    <textarea name="address" id="address" cols="29" rows="10" required></textarea>
                </label>

                <button type="submit">Submit</button>
            </div>
        </div>
    </form>
</body>
</html>
